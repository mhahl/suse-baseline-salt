# Forgejo / Gitea Actions workflow
# Runs the Goss tests inside a container on openSUSE Tumbleweed runners.
#
# - The job is scheduled on runners labeled `opensuse-tumbleweed`
#   (these runners must have a container runtime available, e.g. Docker/Podman).
# - The actual test steps execute inside a fresh `opensuse/tumbleweed:latest`
#   container for a clean, reproducible environment.
# - `--privileged` is used so that sysctl writes, systemd unit state, etc.
#   can be exercised as much as possible inside the container.
#
# Notes:
# - Monitoring modules (falco, node_exporter, vmagent) are explicitly enabled
#   via a CI pillar so their Goss assertions are exercised.
# - Assertions that require a full host (live kernel params, firewalld runtime
#   commands, etc.) are automatically skipped inside the container via the
#   existing skip rules in the goss/ files (using `systemd-detect-virt --container`).

name: goss

on:
  push:
    branches: [main]
    paths:
      - "goss/**"
      - "salt/**"
      - "pillar/**"
      - "Makefile"
      - ".forgejo/workflows/goss.yml"
  pull_request:
    branches: [main]
    paths:
      - "goss/**"
      - "salt/**"
      - "pillar/**"
      - "Makefile"
      - ".forgejo/workflows/goss.yml"

jobs:
  goss:
    runs-on: opensuse-tumbleweed
    container:
      image: opensuse/tumbleweed:latest
      options: --privileged

    steps:

      - name: Install Node.js (required for JS actions)
        run: |
          zypper refresh
          zypper --non-interactive install -y nodejs npm

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages (SUSE)
        run: |
          set -euo pipefail
          zypper --non-interactive refresh
          zypper --non-interactive install --no-recommends \
            salt-minion make curl git ca-certificates \
            audit chrony firewalld systemd-resolved cronie sudo \
            pam pam-config cracklib systemd
          zypper --non-interactive install --no-recommends prometheus-node_exporter || true

      - name: Install Goss
        run: |
          set -euo pipefail
          GOSS_VERSION="v0.4.9"
          curl -fsSL "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/goss-linux-amd64" \
            -o /usr/local/bin/goss
          chmod +x /usr/local/bin/goss
          goss --version

      - name: Prepare Salt file roots and pillar (with CI overrides)
        run: |
          set -euo pipefail
          mkdir -p /srv/salt /srv/pillar

          # Symlink the repo content directly so state.apply baseline / monitoring works
          ln -sfn "$PWD/salt/baseline"     /srv/salt/baseline
          ln -sfn "$PWD/salt/monitoring"  /srv/salt/monitoring

          ln -sfn "$PWD/pillar/baseline"    /srv/pillar/baseline
          ln -sfn "$PWD/pillar/monitoring"  /srv/pillar/monitoring

          # Minimal top files so highstate / direct apply works inside the test container
          cat > /srv/salt/top.sls << 'EOF'
          base:
            '*':
              - baseline.init
              - monitoring.init
          EOF

          cat > /srv/pillar/top.sls << 'EOF'
          base:
            '*':
              # Baseline pillar data is split by category (no top-level "baseline" SLS exists)
              - baseline.system
              - baseline.hardening
              - baseline.network
              - monitoring.falco
              - monitoring.node_exporter
              - monitoring.vmagent
              # CI overrides (enables monitoring modules for Goss coverage)
              - ci
          EOF

          # CI pillar that turns on the monitoring modules so their Goss tests run
          cat > /srv/pillar/ci.sls << 'EOF'
          monitoring:
            falco:
              enabled: true
            node_exporter:
              enabled: true
            vmagent:
              enabled: true
              remote_write_url: "http://127.0.0.1:8428/api/v1/write"
              scrape_configs: |
                - job_name: 'ci'
                  static_configs:
                    - targets: ['127.0.0.1:9100']
          EOF

          echo "Salt roots and pillars prepared."

      - name: Apply Salt states (baseline + monitoring)
        run: |
          set -euo pipefail
          # Use an explicit local-only config dir. This ensures we control file/pillar roots
          # and run fully offline (avoids "not available on the salt master" errors from
          # any system /etc/salt/minion that may point at a master).
          mkdir -p /tmp/salt-ci/etc/salt
          cat > /tmp/salt-ci/etc/salt/minion << 'MINIONCFG'
          file_roots:
            base:
              - /srv/salt
          pillar_roots:
            base:
              - /srv/pillar
          MINIONCFG

          # --local forces masterless operation; -c points at our config.
          salt-call --local -c /tmp/salt-ci/etc/salt --log-level=warning state.apply baseline monitoring

      - name: Run Goss (all tests)
        run: |
          set -euo pipefail
          # Goss files contain skip rules that trigger inside containers
          # (kernel params, firewalld runtime commands, etc.).
          goss --gossfile goss/goss.yaml validate --format tap

      - name: Run individual component Goss targets (for visibility)
        run: |
          set +e
          echo "=== make goss-profile ==="
          make goss-profile
          echo "=== make goss-chrony ==="
          make goss-chrony
          echo "=== make goss-audit ==="
          make goss-audit
          echo "=== make goss-falco ==="
          make goss-falco
          echo "=== make goss-vmagent ==="
          make goss-vmagent
          echo "=== make goss-node_exporter ==="
          make goss-node_exporter || true
          echo "Component runs complete."
