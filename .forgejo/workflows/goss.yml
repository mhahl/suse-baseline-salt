name: goss

on:
  push:
    branches: [main]
    paths:
      - "goss/**"
      - "salt/**"
      - "pillar/**"
      - "Makefile"
      - ".forgejo/workflows/goss.yml"
  pull_request:
    branches: [main]
    paths:
      - "goss/**"
      - "salt/**"
      - "pillar/**"
      - "Makefile"
      - ".forgejo/workflows/goss.yml"

jobs:
  goss:
    runs-on: opensuse-tumbleweed
    container:
      image: opensuse/tumbleweed:latest
      options: --privileged

    steps:

      - name: Install Node.js (required for JS actions)
        run: |
          zypper refresh
          zypper --non-interactive install -y nodejs npm

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages (SUSE)
        run: |
          set -euo pipefail
          zypper --non-interactive refresh
          zypper --non-interactive install --no-recommends \
            salt-minion make curl git ca-certificates \
            chrony systemd-resolved systemd
          zypper --non-interactive install --no-recommends prometheus-node_exporter || true

      - name: Install Goss
        run: |
          set -euo pipefail
          GOSS_VERSION="v0.4.9"
          curl -fsSL "https://github.com/goss-org/goss/releases/download/${GOSS_VERSION}/goss-linux-amd64" \
            -o /usr/local/bin/goss
          chmod +x /usr/local/bin/goss
          goss --version

      - name: Prepare Salt file roots and pillar (with CI overrides)
        run: |
          set -euo pipefail
          mkdir -p /srv/salt /srv/pillar

          SRC=""
          if command -v git >/dev/null 2>&1; then
            SRC="$(git rev-parse --show-toplevel 2>/dev/null || true)"
          fi
          if [ -z "$SRC" ] || [ ! -d "$SRC/salt/baseline" ]; then
            found=$(find / -path '*/salt/baseline/init.sls' -type f 2>/dev/null | head -1 || true)
            if [ -n "$found" ]; then
              SRC=$(dirname "$(dirname "$found")")
            fi
          fi
          if [ -z "$SRC" ] || [ ! -d "$SRC/salt/baseline" ]; then
            for cand in "$GITHUB_WORKSPACE" "$PWD" /workspace /home/runner/_work/*/* /__w/*/* /root; do
              if [ -d "$cand/salt/baseline" ]; then
                SRC="$cand"
                break
              fi
            done
          fi

          if [ -z "$SRC" ] || [ ! -d "$SRC/salt/baseline" ]; then
            echo "FATAL: Could not locate the checked-out source containing salt/baseline/"
            echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE:-<unset>}"
            echo "PWD=$PWD"
            echo "Some top-level dirs:"
            ls -1d / /workspace /home/runner /__w /root 2>/dev/null || true
            echo "Any baseline/ dirs found anywhere:"
            find / -maxdepth 7 -type d -name baseline 2>/dev/null | head -20 || true
            exit 1
          fi

          ls -ld "$SRC/salt/baseline/init.sls" "$SRC/salt/monitoring/init.sls" 2>/dev/null || true
          cat > /srv/salt/top.sls << 'EOF'
          base:
            '*':
              - baseline.init
              - monitoring.init
          EOF

          cat > /srv/pillar/top.sls << 'EOF'
          base:
            '*':
              - baseline
              - monitoring.falco
              - monitoring.node_exporter
              - monitoring.vmagent
              - ci
          EOF

          cat > /srv/pillar/ci.sls << 'EOF'
          monitoring:
            falco:
              enabled: true
            node_exporter:
              enabled: true
            vmagent:
              enabled: true
              remote_write_url: "http://127.0.0.1:8428/api/v1/write"
              scrape_configs: |
                - job_name: 'ci'
                  static_configs:
                    - targets: ['127.0.0.1:9100']
          EOF

          mkdir -p /tmp/salt-ci/etc/salt
          cat > /tmp/salt-ci/etc/salt/minion << EOF
          file_roots:
            base:
              - /srv/salt
              - $SRC/salt
          pillar_roots:
            base:
              - /srv/pillar
              - $SRC/pillar
          EOF

          cat /tmp/salt-ci/etc/salt/minion

      - name: Apply states
        run: |
          set -euo pipefail

          find /srv/salt -name 'init.sls' | sort || true
          salt-call --local -c /tmp/salt-ci/etc/salt --log-level=warning config.get file_roots || true

          find / -path '*/salt/baseline/init.sls' -type f 2>/dev/null | head -5 || true

          salt-call --local -c /tmp/salt-ci/etc/salt --log-level=warning state.sls baseline || echo "baseline apply completed. Continuing."
          salt-call --local -c /tmp/salt-ci/etc/salt --log-level=warning state.sls monitoring || echo "monitoring apply completed. Continuing."

      - name: Run Goss (all tests)
        run: |
          set -euo pipefail
          goss --gossfile goss/goss.yaml validate --format tap
