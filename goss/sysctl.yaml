# Goss tests for baseline.sysctl

# The config file is the primary assertion (always validated).
# Live /proc/sys checks are best-effort only (many params are restricted inside
# containers) and are consolidated into a single command to avoid one Goss test
# per parameter.
file:
  /etc/sysctl.d/99-baseline-hardening.conf:
    exists: true
    mode: "0644"
    owner: root
    group: root
    contains:
      - "SUSE Baseline - Kernel & Network Hardening"
      - "net.ipv4.conf.all.rp_filter"

# Live kernel param checks are best-effort only (many params are restricted or
# namespaced inside containers). The primary assertion is the config file above.
# We use a single consolidated command (with inline container detection) to avoid
# one Goss check per parameter and the `skip:` list syntax under `command:`
# resources (which triggers "cannot unmarshal !!seq into bool" in Goss v0.4.9).
command:
  "sh -c '
    if systemd-detect-virt --container >/dev/null 2>&1; then
      exit 0
    fi
    set -e
    test \"\$(cat /proc/sys/net/ipv4/conf/all/rp_filter 2>/dev/null || echo 1)\" = 1
    test \"\$(cat /proc/sys/net/ipv4/conf/default/rp_filter 2>/dev/null || echo 1)\" = 1
    test \"\$(cat /proc/sys/net/ipv4/tcp_syncookies 2>/dev/null || echo 1)\" = 1
    test \"\$(cat /proc/sys/net/ipv4/ip_forward 2>/dev/null || echo 0)\" = 0
    test \"\$(cat /proc/sys/kernel/dmesg_restrict 2>/dev/null || echo 1)\" = 1
    test \"\$(cat /proc/sys/kernel/kptr_restrict 2>/dev/null || echo 2)\" = 2
    test \"\$(cat /proc/sys/fs/protected_hardlinks 2>/dev/null || echo 1)\" = 1
    test \"\$(cat /proc/sys/fs/protected_symlinks 2>/dev/null || echo 1)\" = 1
  '":
    exit-status: 0
