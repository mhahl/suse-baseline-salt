# Goss tests for monitoring.vmagent

user:
  vmagent:
    exists: true
    home: /var/lib/vmagent
    title: "vmagent system user exists"

file:
  /usr/local/bin/vmagent:
    exists: true
    mode: "0755"
    owner: root
    group: root
    title: "vmagent binary is installed"

  /etc/vmagent/scrape.yml:
    exists: true
    mode: "0644"
    owner: vmagent
    group: vmagent
    contains:
      - "job_name:"
    title: "vmagent scrape config exists"

  /etc/systemd/system/vmagent.service:
    exists: true
    mode: "0644"
    owner: root
    group: root
    contains:
      - "vmagent"
      - "remoteWrite.url"
    title: "vmagent systemd unit file exists"

service:
  vmagent:
    enabled: true
    # In Goss container tests we intentionally do not start services
    running: false
    title: "vmagent service is enabled (not started in container tests)"
