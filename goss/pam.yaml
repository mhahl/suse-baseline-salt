# Goss tests for baseline.pam (faillock + pwquality)

package:
  pam:
    installed: true
    title: "pam packages are installed"

file:
  /etc/security/faillock.conf:
    exists: true
    mode: "0644"
    contains:
      - "deny ="
      - "unlock_time ="
      - "even_deny_root"
    title: "faillock.conf has baseline hardening settings"

  /etc/security/pwquality.conf:
    exists: true
    mode: "0644"
    contains:
      - "minlen ="
      - "minclass ="
      - "enforce_for_root"
    title: "pwquality.conf has baseline password policy"
