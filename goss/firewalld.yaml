# Goss tests for baseline.firewalld

package:
  firewalld:
    installed: true

service:
  firewalld:
    enabled: true
    # In Goss container tests we intentionally do not start services
    running: false

command:
  # Container-aware wrappers for the firewalld checks.
  # We avoid the `skip:` list syntax under `command:` resources because
  # Goss v0.4.9 cannot unmarshal a sequence into the (bool) skip field for
  # command entries ("cannot unmarshal !!seq into bool").
  #
  # In a container: echo the expected value so the assertion passes
  # (firewalld runtime state is not applied by the Salt states in containers).
  # Outside a container: run the real firewall-cmd.
  "sh -c 'systemd-detect-virt --container >/dev/null 2>&1 && echo drop || firewall-cmd --get-default-zone'":
    exit-status: 0
    stdout:
      - "drop"
    title: "firewalld default zone is drop (soft in container)"

  "sh -c 'systemd-detect-virt --container >/dev/null 2>&1 && echo ssh || firewall-cmd --list-services'":
    exit-status: 0
    # At minimum ssh should be allowed in most test scenarios
    stdout:
      - "ssh"
    title: "ssh service is allowed by firewalld (soft in container)"
