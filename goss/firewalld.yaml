# Goss tests for baseline.firewalld

package:
  firewalld:
    installed: true

service:
  firewalld:
    enabled: true
    # In Goss container tests we intentionally do not start services
    running: false

command:
  "firewall-cmd --get-default-zone":
    exit-status: 0
    stdout:
      - "drop"

  "firewall-cmd --list-services":
    exit-status: 0
    # At minimum ssh should be allowed in most test scenarios
    stdout:
      - "ssh"
