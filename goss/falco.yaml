# Goss tests for monitoring.falco

package:
  falco:
    installed: true

file:
  /etc/falco/falco.yaml:
    exists: true
    mode: "0644"
    owner: root
    group: root
    contains:
      - "http_output:"
      - "enabled: true"

service:
  falco:
    enabled: true
    # In Goss container tests we intentionally do not start services
    running: false
