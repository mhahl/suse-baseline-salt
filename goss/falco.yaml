# Goss tests for monitoring.falco

package:
  falco:
    installed: true
    title: "falco package is installed (when enabled)"

file:
  /etc/falco/falco.yaml:
    exists: true
    mode: "0644"
    owner: root
    group: root
    contains:
      - "http_output:"
      - "enabled: true"
    title: "falco HTTP output is enabled in config"

service:
  falco:
    enabled: true
    # In Goss container tests we intentionally do not start services
    running: false
    title: "falco service is enabled (not started in container tests)"
