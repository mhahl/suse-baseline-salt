# Goss tests for monitoring.falco

package:
  falco:
    installed: true
    title: "falco package is installed"

file:
  /etc/falco/falco.yaml:
    exists: true
    mode: "0644"
    owner: root
    group: root
    contents:
      - "http_output:"
      - "enabled: true"
    title: "falco HTTP output is enabled in config"

  /etc/falco/rules.d:
    exists: true
    filetype: directory
    owner: root
    group: root
    title: "falco custom rules directory is deployed"

  /etc/falco/rules.d/detections.yaml:
    exists: true
    mode: "0644"
    owner: root
    group: root
    title: "falco detections rules are deployed"
