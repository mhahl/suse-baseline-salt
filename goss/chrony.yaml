# Goss tests for baseline.chrony

package:
  chrony:
    installed: true

service:
  chronyd:
    enabled: true
    running: false
    skip:
      - command: "systemd-detect-virt --container"
        exit-status: 0

file:
  /etc/chrony.conf:
    exists: true
    mode: "0644"
    contains:
      - "server time1.google.com"
      - "rtcsync"
      - "minsources 3"
