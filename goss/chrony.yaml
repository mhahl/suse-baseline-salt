# Goss tests for baseline.chrony

package:
  chrony:
    installed: true
    title: "chrony package is installed"

service:
  chronyd:
    enabled: true
    title: "chronyd service is enabled and running"

file:
  /etc/chrony.conf:
    exists: true
    mode: "0644"
    contains:
      - "server time1.google.com"
      - "rtcsync"
      - "minsources 3"
    title: "chrony config has hardened NTP servers"
