# Goss tests for baseline.chrony

package:
  chrony:
    installed: true

service:
  chronyd:
    enabled: true
    # In Goss container tests we intentionally do not start services
    running: false

file:
  /etc/chrony.conf:
    exists: true
    mode: "0644"
    contains:
      - "server time1.google.com"
      - "rtcsync"
      - "minsources 3"
