# Goss tests for baseline.coredump

file:
  /etc/systemd/coredump.conf.d/99-baseline.conf:
    exists: true
    mode: "0644"
    contains:
      - "[Coredump]"
      - "Storage=external"
      - "Compress=yes"

command:
  # Container-aware version of the coredump socket check.
  # - Outside a container: run the real `systemctl is-active ... || true` (always exits 0).
  # - Inside a container: short-circuit to exit 0 (the live socket status is not meaningful,
  #   and we avoid the conditional `skip` list syntax under a `command:` resource, which
  #   can cause "cannot unmarshal !!seq into bool" in Goss v0.4.9).
  "sh -c 'systemd-detect-virt --container >/dev/null 2>&1 && exit 0 || systemctl is-active systemd-coredump.socket || true'":
    exit-status: 0
    title: "systemd-coredump.socket is active (or skipped in container)"
