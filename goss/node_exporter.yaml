# Goss tests for monitoring.node_exporter

package:
  golang-github-prometheus-node_exporter:
    installed: true
    title: "prometheus-node_exporter package is installed"

file:
  /etc/sysconfig/prometheus-node_exporter:
    exists: true
    mode: "0644"
    owner: root
    group: root
    contains:
      - "ARGS"
    title: "node_exporter sysconfig file exists"

service:
  prometheus-node_exporter:
    enabled: true
    running: true
    title: "node_exporter service is enabled and running"
