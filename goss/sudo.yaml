# Goss tests for baseline.sudo

package:
  sudo:
    installed: true

file:
  /etc/sudoers.d/99-baseline:
    exists: true
    mode: "0440"
    owner: root
    group: root
    contains:
      - "Defaults    requiretty"
      - "Defaults    logfile=\"/var/log/sudo.log\""
      - "Defaults    insults"

command:
  visudo -c -f /etc/sudoers.d/99-baseline:
    exit-status: 0
    stdout:
      - "/etc/sudoers.d/99-baseline: parsed OK"
