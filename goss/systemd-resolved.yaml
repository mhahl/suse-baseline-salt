# Goss tests for baseline.systemd-resolved

package:
  systemd-resolved:
    installed: true

service:
  systemd-resolved:
    enabled: true
    # In Goss container tests we intentionally do not start services
    running: false

file:
  /etc/systemd/resolved.conf:
    exists: true
    mode: "0644"
    contains:
      - "DNSOverTLS=yes"
      - "DNSSEC=yes"
      - "FallbackDNS="

  /etc/resolv.conf:
    exists: true
    filetype: symlink
    linked-to: /run/systemd/resolve/stub-resolv.conf
