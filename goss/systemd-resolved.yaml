# Goss tests for baseline.systemd-resolved

package:
  systemd-resolved:
    installed: true
    title: "systemd-resolved package is installed"

service:
  systemd-resolved:
    enabled: true
    running: true
    title: "systemd-resolved service is enabled and running"

file:
  /etc/systemd/resolved.conf:
    exists: true
    mode: "0644"
    contains:
      - "DNSOverTLS=yes"
      - "DNSSEC=yes"
      - "FallbackDNS="
    title: "systemd-resolved uses DNS-over-TLS + DNSSEC"

  /etc/resolv.conf:
    exists: true
    filetype: symlink
    linked-to: /run/systemd/resolve/stub-resolv.conf
    title: "/etc/resolv.conf is symlinked to systemd-resolved stub"
