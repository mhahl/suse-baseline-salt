# Goss tests for baseline.audit

package:
  audit:
    installed: true

service:
  auditd:
    enabled: true
    running: true

file:
  /etc/audit/rules.d/99-baseline.rules:
    exists: true
    mode: "0640"
    owner: root
    contains:
      - "-w /etc/passwd -p wa -k identity"
      - "-w /etc/shadow -p wa -k identity"
      - "-w /etc/sudoers -p wa -k privilege_escalation"

command:
  "auditctl -l | grep -E 'identity|privilege_escalation'":
    exit-status: 0
