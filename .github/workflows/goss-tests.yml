name: Goss Tests (Server Spec)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - profile
          - systemd-resolved
          - chrony
          - banner
          - sysctl
          - coredump
          - audit
          - sudo
          - pam
          - firewalld
          # - fapolicyd     # Disabled by default in pillar
          - usb
          - grub
          - integrity
          - updates

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Run Goss tests in openSUSE Tumbleweed container
        run: |
          docker run --rm --privileged --user root \
            -v ${{ github.workspace }}:/workspace \
            opensuse/tumbleweed:latest \
            /bin/bash -euo pipefail -c '
              echo ""
              echo "================================================================================"
              echo ">>> SETTING UP CONTAINER FOR: ${{ matrix.component }}"
              echo "================================================================================"

              # Install dependencies
              zypper --non-interactive refresh

              BASE_PACKAGES="salt-minion curl ca-certificates systemd procps iproute2 firewalld"

              # Component-specific extra packages
              EXTRA_PACKAGES=""
              if [[ "${{ matrix.component }}" == "integrity" ]]; then
                EXTRA_PACKAGES="cronie"
              fi

              zypper --non-interactive install --no-recommends $BASE_PACKAGES $EXTRA_PACKAGES

              # Fix for Salt's cron execution module in minimal Tumbleweed containers
              if [[ "${{ matrix.component }}" == "integrity" ]]; then
                mkdir -p /var/spool/cron/crontabs /etc/cron.d
                touch /var/spool/cron/crontabs/root 2>/dev/null || true
              fi

              # Install Goss
              echo "Installing Goss..."
              curl -L https://github.com/goss-org/goss/releases/latest/download/goss-linux-amd64 -o /usr/local/bin/goss
              chmod +rx /usr/local/bin/goss
              goss --version

              # Prepare Salt environment
              echo "Preparing Salt local environment..."
              mkdir -p /srv/salt /srv/pillar /etc/salt

              # Copy Salt states
              cp -r /workspace/salt/* /srv/salt/

              # Create minimal top.sls for this component
              cat > /srv/salt/top.sls << EOF
          base:
            "*":
              - baseline.${{ matrix.component }}.main
          EOF

              # Copy pillar
              cp /workspace/pillar/baseline.sls /srv/pillar/baseline.sls

              # Create pillar top
              cat > /srv/pillar/top.sls << EOF
          base:
            "*":
              - baseline
          EOF

              # Minimal minion config for local mode
              cat > /etc/salt/minion << EOF
          file_roots:
            base:
              - /srv/salt
          pillar_roots:
            base:
              - /srv/pillar
          EOF

              # Apply the Salt state for this component
              echo ""
              echo "================================================================================"
              echo ">>> SALT APPLY: baseline.${{ matrix.component }}.main"
              echo "================================================================================"
              salt-call --local --retcode-passthrough state.apply baseline.${{ matrix.component }}.main --log-level=warning || {
                echo "Salt apply failed for ${{ matrix.component }}"
                exit 1
              }

              # Run Goss test
              echo ""
              echo "================================================================================"
              echo ">>> GOSS VALIDATION"
              echo "================================================================================"
              GOSSFILE="/workspace/goss/${{ matrix.component }}.yaml"
              if [ -f "$GOSSFILE" ]; then
                goss --gossfile "$GOSSFILE" validate
              else
                echo "No goss file found for ${{ matrix.component }} at $GOSSFILE - skipping"
              fi

              echo ""
              echo "================================================================================"
              echo ">>> FINISHED: ${{ matrix.component }}"
              echo "================================================================================"
            '
        shell: bash
        env:
          COMPONENT: ${{ matrix.component }}
